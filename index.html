<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <title>Remote Qwen</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Remote Qwen</h1>
        <p id="status">Checking backend…</p>
      </div>
      <button id="change-key" class="secondary" type="button">Change key</button>
    </header>

    <section id="key-panel" class="panel">
      <h2>Connect</h2>
      <p>Enter the API key stored in your home PC’s <code>.env</code> file.</p>
      <form id="key-form">
        <label for="api-key">API key</label>
        <input id="api-key" type="password" autocomplete="off" required>
        <button type="submit">Save for this tab</button>
      </form>
    </section>

    <section id="chat-panel" class="chat-panel" hidden>
      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="chat-form" class="composer">
        <label class="sr-only" for="prompt">Message</label>
        <textarea
          id="prompt"
          rows="3"
          placeholder="Message Qwen…"
          required
        ></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
